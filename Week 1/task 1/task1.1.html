<!DOCTYPE html>
<html>
<head>
    <title>Hotel Form</title>
</head>

<body style="font-family:Arial;background-color: #4f4f50;">

<h2 style="text-align:center;color:rgb(14, 13, 13);">
    Registration Form
</h2>

<table border="1" cellpadding="8" cellspacing="0" style="margin:auto; border-collapse:collapse;">

    <tr>
        <td>Name</td>
        <td><input type="text" placeholder="Enter Name" style="width:300px;"></td>
    </tr>

    <tr>
        <td>Email</td>
        <td><input type="email" placeholder="Enter Email" style="width:300px;"></td>
    </tr>

    <tr>
        <td>Mobile Number</td>
        <td><input type="tel" placeholder="Enter Mobile Number" style="width:300px;"></td>
    </tr>

    <tr>
        <td>Arrival Date</td>
        <td><input type="date" style="width:300px;"></td>
    </tr>

    <tr>
        <td>Room Type</td>
        <td>
            <input type="radio" name="room"> Single
            <input type="radio" name="room"> Double
            <input type="radio" name="room"> Presidential Suite
        </td>
    </tr>

    <tr>
        <td>Preferences</td>
        <td>
            <input type="checkbox"> Non Smoking
            <input type="checkbox"> Internet
            <input type="checkbox"> Firm Mattress
        </td>
    </tr>

    <tr>
        <td>Mode of payment</td>
        <td>
            <select style="width:150px;">
                <option>Select</option>
                <option>Cash</option>
                <option>Card</option>
            </select>
        </td>
    </tr>

    <tr>
        <td colspan="2" style="text-align:center;">
            <input type="submit" value="Submit">
        </td>
    </tr>

</table>

</body>
</html>
